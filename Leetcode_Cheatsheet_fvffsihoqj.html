<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple LeetCode Top 60 Cheat Sheet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .subtitle {
            color: #8b949e;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 1em;
        }

        .search-box input::placeholder {
            color: #6e7681;
        }

        .search-box input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #30363d;
            border-color: #58a6ff;
        }

        .btn.active {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
        }

        .difficulty-filter {
            display: flex;
            gap: 8px;
        }

        .difficulty-btn {
            padding: 8px 12px;
            font-size: 0.9em;
        }

        .difficulty-btn.easy {
            color: #3fb950;
            border-color: #3fb950;
        }

        .difficulty-btn.easy.active {
            background-color: #3fb950;
            color: #0d1117;
        }

        .difficulty-btn.medium {
            color: #d29922;
            border-color: #d29922;
        }

        .difficulty-btn.medium.active {
            background-color: #d29922;
            color: #0d1117;
        }

        .difficulty-btn.hard {
            color: #f85149;
            border-color: #f85149;
        }

        .difficulty-btn.hard.active {
            background-color: #f85149;
            color: #0d1117;
        }

        .pattern-section {
            margin-bottom: 40px;
        }

        .pattern-header {
            background-color: #161b22;
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363d;
            transition: all 0.2s;
        }

        .pattern-header:hover {
            background-color: #21262d;
            border-color: #58a6ff;
        }

        .pattern-title {
            font-size: 1.4em;
            font-weight: 600;
            color: #58a6ff;
        }

        .pattern-count {
            background-color: #0d1117;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.9em;
            color: #8b949e;
        }

        .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.2s;
        }

        .pattern-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .problems-grid {
            display: grid;
            gap: 20px;
            margin-left: 0;
            max-height: 10000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .problems-grid.collapsed {
            max-height: 0;
            overflow: hidden;
        }

        .problem-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .problem-card:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        .problem-header {
            padding: 15px 20px;
            background-color: #0d1117;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #30363d;
        }

        .problem-title {
            display: flex;
            gap: 15px;
            align-items: center;
            flex: 1;
        }

        .problem-number {
            font-weight: 600;
            color: #58a6ff;
            min-width: 50px;
        }

        .problem-name {
            font-size: 1.05em;
            color: #c9d1d9;
        }

        .problem-meta {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .badge.easy {
            background-color: rgba(63, 185, 80, 0.1);
            color: #3fb950;
        }

        .badge.medium {
            background-color: rgba(210, 153, 34, 0.1);
            color: #d29922;
        }

        .badge.hard {
            background-color: rgba(248, 81, 73, 0.1);
            color: #f85149;
        }

        .pattern-badge {
            background-color: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
        }

        .problem-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        .problem-content.collapsed {
            max-height: 0;
        }

        .solution-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            background-color: #161b22;
        }

        @media (max-width: 768px) {
            .solution-grid {
                grid-template-columns: 1fr;
            }
        }

        .solution {
            display: flex;
            flex-direction: column;
        }

        .solution-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .key-points {
            margin-bottom: 15px;
        }

        .key-points h4 {
            color: #8b949e;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .key-points ol {
            margin-left: 20px;
            color: #c9d1d9;
            font-size: 0.95em;
        }

        .key-points li {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .complexity-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .complexity-badge {
            padding: 6px 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
            color: #79c0ff;
        }

        .code-block {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #79c0ff;
            line-height: 1.5;
        }

        .code-block code {
            color: #79c0ff;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .expand-all-btn {
            padding: 10px 20px;
            background-color: #238636;
            border: 1px solid #2ea043;
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }

        .expand-all-btn:hover {
            background-color: #2ea043;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            font-size: 1.1em;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .difficulty-filter {
                width: 100%;
                justify-content: space-between;
            }

            .pattern-title {
                font-size: 1.1em;
            }

            .problem-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .problem-meta {
                margin-top: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apple LeetCode Top 60</h1>
            <p class="subtitle">Interview Preparation Cheat Sheet</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by problem name or pattern...">
            </div>
            <div class="filter-buttons">
                <button class="btn expand-all-btn" id="expandAllBtn">Expand All</button>
                <button class="btn" id="collapseAllBtn">Collapse All</button>
            </div>
            <div class="difficulty-filter">
                <button class="btn difficulty-btn easy active" data-difficulty="all">All</button>
                <button class="btn difficulty-btn easy" data-difficulty="Easy">Easy</button>
                <button class="btn difficulty-btn medium" data-difficulty="Medium">Medium</button>
                <button class="btn difficulty-btn hard" data-difficulty="Hard">Hard</button>
            </div>
        </div>

        <div id="patternsContainer"></div>
        <div id="noResults" class="no-results hidden">No problems match your filters</div>
    </div>

    <script>
        const problemsData = {
            "1": {"title": "Two Sum", "difficulty": "Easy", "patterns": ["Array", "Hash Table"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Use two nested loops to iterate through all pairs of elements", "For each pair (i, j), check if nums[i] + nums[j] equals target", "If yes, return [i, j]"], "opt_points": ["Create an empty hash map to store value -> index mappings", "For each element at index i with value nums[i]:", "Calculate complement = target - nums[i]"], "bf_code": "def twoSum(nums, target):\n    for i in range(len(nums)):\n        for j in range(i + 1, len(nums)):\n            if nums[i] + nums[j] == target:\n                return [i, j]\n    return []", "opt_code": "def twoSum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i\n    return []"},
            "3": {"title": "Longest Substring Without Repeating Characters", "difficulty": "Medium", "patterns": ["Sliding Window", "String"], "bf_time": "O(n³)", "bf_space": "O(min(m,n))", "opt_time": "O(n)", "opt_space": "O(min(m,n))", "bf_points": ["Iterate through all possible starting positions i", "For each starting position, iterate through all ending positions j >= i", "For each substring s[i:j+1], check if all characters are unique"], "opt_points": ["Use two pointers: left and right, both starting at 0", "Maintain a dictionary/map of character -> its last seen index", "Expand the window by moving right pointer"], "bf_code": "def lengthOfLongestSubstring(s):\n    max_len = 0\n    for i in range(len(s)):\n        chars = set()\n        for j in range(i, len(s)):\n            if s[j] in chars:\n                break\n            chars.add(s[j])\n            max_len = max(max_len, len(chars))\n    return max_len", "opt_code": "def lengthOfLongestSubstring(s):\n    char_index = {}\n    max_len = 0\n    left = 0\n    for right, char in enumerate(s):\n        if char in char_index:\n            left = max(left, char_index[char] + 1)\n        char_index[char] = right\n        max_len = max(max_len, right - left + 1)\n    return max_len"},
            "7": {"title": "Reverse Integer", "difficulty": "Medium", "patterns": ["Math"], "bf_time": "O(log n)", "bf_space": "O(log n)", "opt_time": "O(log n)", "opt_space": "O(1)", "bf_points": ["Handle the sign separately", "Convert absolute value to string and reverse", "Convert back to integer"], "opt_points": ["Initialize reversed = 0", "While x != 0: extract last digit (x % 10)", "Multiply reversed by 10 and add the digit"], "bf_code": "def reverse(x):\n    sign = -1 if x < 0 else 1\n    x = abs(x)\n    rev = int(str(x)[::-1])\n    rev *= sign\n    if rev < -(2**31) or rev > 2**31 - 1:\n        return 0\n    return rev", "opt_code": "def reverse(x):\n    sign = -1 if x < 0 else 1\n    x = abs(x)\n    rev = 0\n    while x != 0:\n        digit = x % 10\n        if rev > (2**31 - 1) // 10:\n            return 0\n        rev = rev * 10 + digit\n        x //= 10\n    return rev * sign"},
            "10": {"title": "Regular Expression Matching", "difficulty": "Hard", "patterns": ["Dynamic Programming", "String", "Backtracking"], "bf_time": "O(2^(m+n))", "bf_space": "O(m+n)", "opt_time": "O(m*n)", "opt_space": "O(m*n)", "bf_points": ["Recursive function checks if pattern matches string", "Base case: if pattern empty, string must be empty", "If next char is '*', try matching 0 or more"], "opt_points": ["Build a DP table where dp[i][j] = true", "Handle '*' by checking if we can match 0 or more", "Fill table bottom-up"], "bf_code": "def isMatch(s, p):\n    if not p:\n        return not s\n    first_match = bool(s) and p[0] in {s[0], '.'}\n    if len(p) >= 2 and p[1] == '*':\n        return (isMatch(s, p[2:]) or \n                (first_match and isMatch(s[1:], p)))\n    else:\n        return first_match and isMatch(s[1:], p[1:])", "opt_code": "def isMatch(s, p):\n    dp = [[False] * (len(p) + 1) for _ in range(len(s) + 1)]\n    dp[0][0] = True\n    for j in range(2, len(p) + 1):\n        if p[j-1] == '*':\n            dp[0][j] = dp[0][j-2]\n    for i in range(1, len(s) + 1):\n        for j in range(1, len(p) + 1):\n            if p[j-1] == '*':\n                dp[i][j] = dp[i][j-2] or (dp[i-1][j] and (s[i-1] == p[j-2] or p[j-2] == '.'))\n            else:\n                dp[i][j] = dp[i-1][j-1] and (s[i-1] == p[j-1] or p[j-1] == '.')\n    return dp[len(s)][len(p)]"},
            "11": {"title": "Container With Most Water", "difficulty": "Medium", "patterns": ["Two Pointer", "Array"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Use nested loops to check every pair (i, j)", "Calculate area = min(height[i], height[j]) * (j - i)", "Track maximum area"], "opt_points": ["Initialize left at start, right at end", "Calculate area, move pointer with smaller height", "Continue until pointers meet"], "bf_code": "def maxArea(height):\n    max_water = 0\n    for i in range(len(height)):\n        for j in range(i + 1, len(height)):\n            water = min(height[i], height[j]) * (j - i)\n            max_water = max(max_water, water)\n    return max_water", "opt_code": "def maxArea(height):\n    left, right = 0, len(height) - 1\n    max_water = 0\n    while left < right:\n        water = min(height[left], height[right]) * (right - left)\n        max_water = max(max_water, water)\n        if height[left] < height[right]:\n            left += 1\n        else:\n            right -= 1\n    return max_water"},
            "14": {"title": "Longest Common Prefix", "difficulty": "Easy", "patterns": ["String"], "bf_time": "O(n*m)", "bf_space": "O(1)", "opt_time": "O(n*m)", "opt_space": "O(1)", "bf_points": ["Start with first string as initial prefix", "Compare it with each subsequent string", "Reduce prefix to only the matching part"], "opt_points": ["Compare all strings character by character", "Return when mismatch found", "Optimize with early termination"], "bf_code": "def longestCommonPrefix(strs):\n    if not strs:\n        return ''\n    prefix = strs[0]\n    for s in strs[1:]:\n        while not s.startswith(prefix):\n            prefix = prefix[:-1]\n            if not prefix:\n                return ''\n    return prefix", "opt_code": "def longestCommonPrefix(strs):\n    if not strs:\n        return ''\n    for i in range(len(strs[0])):\n        for j in range(1, len(strs)):\n            if i >= len(strs[j]) or strs[0][i] != strs[j][i]:\n                return strs[0][:i]\n    return strs[0]"},
            "15": {"title": "3Sum", "difficulty": "Medium", "patterns": ["Two Pointer", "Array"], "bf_time": "O(n³)", "bf_space": "O(n)", "opt_time": "O(n²)", "opt_space": "O(n)", "bf_points": ["Sort the array", "Use three nested loops to find all triplets", "Skip duplicates carefully"], "opt_points": ["Sort array and iterate with outer loop", "Use two pointers (left, right) for inner pairs", "Skip duplicate values"], "bf_code": "def threeSum(nums):\n    result = []\n    nums.sort()\n    for i in range(len(nums) - 2):\n        for j in range(i + 1, len(nums) - 1):\n            for k in range(j + 1, len(nums)):\n                if nums[i] + nums[j] + nums[k] == 0:\n                    triplet = [nums[i], nums[j], nums[k]]\n                    if triplet not in result:\n                        result.append(triplet)\n    return result", "opt_code": "def threeSum(nums):\n    nums.sort()\n    result = []\n    for i in range(len(nums) - 2):\n        if nums[i] > 0:\n            break\n        if i > 0 and nums[i] == nums[i - 1]:\n            continue\n        left, right = i + 1, len(nums) - 1\n        while left < right:\n            s = nums[i] + nums[left] + nums[right]\n            if s == 0:\n                result.append([nums[i], nums[left], nums[right]])\n                while left < right and nums[left] == nums[left + 1]:\n                    left += 1\n                while left < right and nums[right] == nums[right - 1]:\n                    right -= 1\n                left += 1\n                right -= 1\n            elif s < 0:\n                left += 1\n            else:\n                right -= 1\n    return result"},
            "18": {"title": "4Sum", "difficulty": "Medium", "patterns": ["Two Pointer", "Array"], "bf_time": "O(n⁴)", "bf_space": "O(n)", "opt_time": "O(n³)", "opt_space": "O(n)", "bf_points": ["Use four nested loops", "Check all possible combinations", "Return matching quadruplets"], "opt_points": ["Sort array", "Reduce to 3Sum with outer loop", "Use two pointers for pairs"], "bf_code": "def fourSum(nums, target):\n    result = []\n    nums.sort()\n    for i in range(len(nums) - 3):\n        for j in range(i + 1, len(nums) - 2):\n            for k in range(j + 1, len(nums) - 1):\n                for l in range(k + 1, len(nums)):\n                    if nums[i] + nums[j] + nums[k] + nums[l] == target:\n                        quad = [nums[i], nums[j], nums[k], nums[l]]\n                        if quad not in result:\n                            result.append(quad)\n    return result", "opt_code": "def fourSum(nums, target):\n    nums.sort()\n    result = []\n    for i in range(len(nums) - 3):\n        if nums[i] > target // 4:\n            break\n        if i > 0 and nums[i] == nums[i - 1]:\n            continue\n        for j in range(i + 1, len(nums) - 2):\n            if j > i + 1 and nums[j] == nums[j - 1]:\n                continue\n            left, right = j + 1, len(nums) - 1\n            while left < right:\n                s = nums[i] + nums[j] + nums[left] + nums[right]\n                if s == target:\n                    result.append([nums[i], nums[j], nums[left], nums[right]])\n                    left += 1\n                    right -= 1\n                elif s < target:\n                    left += 1\n                else:\n                    right -= 1\n    return result"},
            "20": {"title": "Valid Parentheses", "difficulty": "Easy", "patterns": ["Stack", "String"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Iterate through each character", "If opening bracket, push onto stack", "If closing bracket, check match"], "opt_points": ["Use stack and bracket mapping", "For opening: push to stack", "For closing: verify match with top"], "bf_code": "def isValid(s):\n    stack = []\n    pairs = {')': '(', ']': '[', '}': '{'}\n    for char in s:\n        if char in pairs:\n            if not stack or stack[-1] != pairs[char]:\n                return False\n            stack.pop()\n        else:\n            stack.append(char)\n    return len(stack) == 0", "opt_code": "def isValid(s):\n    stack = []\n    mapping = {')': '(', ']': '[', '}': '{'}\n    for char in s:\n        if char in mapping:\n            if not stack or stack[-1] != mapping[char]:\n                return False\n            stack.pop()\n        else:\n            stack.append(char)\n    return not stack"},
            "23": {"title": "Merge k Sorted Lists", "difficulty": "Hard", "patterns": ["Linked List", "Heap"], "bf_time": "O(k*N)", "bf_space": "O(1)", "opt_time": "O(N log k)", "opt_space": "O(k)", "bf_points": ["Compare heads of all k lists", "Select minimum, add to result", "Move forward in that list"], "opt_points": ["Use min-heap to track smallest", "Push head of each list into heap", "Pop min, add to result, push next"], "bf_code": "import heapq\ndef mergeKLists(lists):\n    result = []\n    while True:\n        min_val, min_idx = float('inf'), -1\n        for i, lst in enumerate(lists):\n            if lst and lst.val < min_val:\n                min_val, min_idx = lst.val, i\n        if min_idx == -1:\n            break\n        result.append(min_val)\n        lists[min_idx] = lists[min_idx].next\n    return result", "opt_code": "import heapq\ndef mergeKLists(lists):\n    heap = []\n    for i, lst in enumerate(lists):\n        if lst:\n            heapq.heappush(heap, (lst.val, i, lst))\n    dummy = ListNode(0)\n    current = dummy\n    while heap:\n        val, idx, node = heapq.heappop(heap)\n        current.next = node\n        current = current.next\n        if node.next:\n            heapq.heappush(heap, (node.next.val, idx, node.next))\n    return dummy.next"},
            "26": {"title": "Remove Duplicates from Sorted Array", "difficulty": "Easy", "patterns": ["Two Pointer", "Array"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["For each unique element found", "Shift all subsequent elements left", "Repeat until fully processed"], "opt_points": ["Use slow and fast pointers", "Fast moves every step", "Copy when nums[fast] != nums[slow]"], "bf_code": "def removeDuplicates(nums):\n    i = 0\n    while i < len(nums):\n        j = i + 1\n        while j < len(nums) and nums[j] == nums[i]:\n            j += 1\n        for k in range(j, len(nums)):\n            nums[k - (j - i - 1)] = nums[k]\n        i += 1\n    return i", "opt_code": "def removeDuplicates(nums):\n    slow = 0\n    for fast in range(1, len(nums)):\n        if nums[fast] != nums[slow]:\n            slow += 1\n            nums[slow] = nums[fast]\n    return slow + 1"},
            "34": {"title": "Find First and Last Position of Element in Sorted Array", "difficulty": "Medium", "patterns": ["Binary Search", "Array"], "bf_time": "O(n)", "bf_space": "O(1)", "opt_time": "O(log n)", "opt_space": "O(1)", "bf_points": ["Scan from left to find first", "Scan from right to find last", "Return both positions"], "opt_points": ["Use binary search twice", "For leftmost: continue searching left", "For rightmost: continue searching right"], "bf_code": "def searchRange(nums, target):\n    left, right = -1, -1\n    for i in range(len(nums)):\n        if nums[i] == target:\n            if left == -1:\n                left = i\n            right = i\n    return [left, right]", "opt_code": "def searchRange(nums, target):\n    def search_left():\n        l, r = 0, len(nums) - 1\n        result = -1\n        while l <= r:\n            m = (l + r) // 2\n            if nums[m] >= target:\n                if nums[m] == target:\n                    result = m\n                r = m - 1\n            else:\n                l = m + 1\n        return result\n    def search_right():\n        l, r = 0, len(nums) - 1\n        result = -1\n        while l <= r:\n            m = (l + r) // 2\n            if nums[m] <= target:\n                if nums[m] == target:\n                    result = m\n                l = m + 1\n            else:\n                r = m - 1\n        return result\n    return [search_left(), search_right()]"},
            "36": {"title": "Valid Sudoku", "difficulty": "Medium", "patterns": ["Hash Table", "Matrix"], "bf_time": "O(1)", "bf_space": "O(1)", "opt_time": "O(1)", "opt_space": "O(1)", "bf_points": ["For each cell with a number", "Check its row, column, and 3x3 box", "Ensure no duplicates"], "opt_points": ["Use sets for rows, columns, boxes", "Single pass through board", "Check membership in sets"], "bf_code": "def isValidSudoku(board):\n    for i in range(9):\n        for j in range(9):\n            if board[i][j] != '.':\n                num = board[i][j]\n                for k in range(9):\n                    if k != j and board[i][k] == num:\n                        return False\n                for k in range(9):\n                    if k != i and board[k][j] == num:\n                        return False\n                for x in range(3):\n                    for y in range(3):\n                        if (3*(i//3)+x, 3*(j//3)+y) != (i,j):\n                            if board[3*(i//3)+x][3*(j//3)+y] == num:\n                                return False\n    return True", "opt_code": "def isValidSudoku(board):\n    rows = [set() for _ in range(9)]\n    cols = [set() for _ in range(9)]\n    boxes = [set() for _ in range(9)]\n    for i in range(9):\n        for j in range(9):\n            if board[i][j] != '.':\n                num = board[i][j]\n                box_idx = (i // 3) * 3 + (j // 3)\n                if num in rows[i] or num in cols[j] or num in boxes[box_idx]:\n                    return False\n                rows[i].add(num)\n                cols[j].add(num)\n                boxes[box_idx].add(num)\n    return True"},
            "42": {"title": "Trapping Rain Water", "difficulty": "Hard", "patterns": ["Two Pointer", "Stack"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["For each element, find max height to left", "Find max height to right", "Water = min(leftMax, rightMax) - height"], "opt_points": ["Use two pointers from ends", "Track leftMax and rightMax", "Water at each = min(leftMax, rightMax) - height"], "bf_code": "def trap(height):\n    if not height:\n        return 0\n    water = 0\n    for i in range(len(height)):\n        left_max = max(height[:i+1])\n        right_max = max(height[i:])\n        water += min(left_max, right_max) - height[i]\n    return water", "opt_code": "def trap(height):\n    if not height:\n        return 0\n    left, right = 0, len(height) - 1\n    left_max, right_max = 0, 0\n    water = 0\n    while left < right:\n        if height[left] < height[right]:\n            if height[left] >= left_max:\n                left_max = height[left]\n            else:\n                water += left_max - height[left]\n            left += 1\n        else:\n            if height[right] >= right_max:\n                right_max = height[right]\n            else:\n                water += right_max - height[right]\n            right -= 1\n    return water"},
            "48": {"title": "Rotate Image", "difficulty": "Medium", "patterns": ["Matrix", "Array"], "bf_time": "O(n²)", "bf_space": "O(n²)", "opt_time": "O(n²)", "opt_space": "O(1)", "bf_points": ["Create a copy of the matrix", "Map each element (i,j) to rotated position", "Copy rotated values back"], "opt_points": ["Rotate layer by layer", "Use 4-way swap for each layer", "Temp variable avoids overwriting"], "bf_code": "def rotate(matrix):\n    n = len(matrix)\n    rotated = [[0] * n for _ in range(n)]\n    for i in range(n):\n        for j in range(n):\n            rotated[j][n-1-i] = matrix[i][j]\n    for i in range(n):\n        for j in range(n):\n            matrix[i][j] = rotated[i][j]", "opt_code": "def rotate(matrix):\n    n = len(matrix)\n    for i in range(n // 2):\n        for j in range(i, n - i - 1):\n            temp = matrix[i][j]\n            matrix[i][j] = matrix[n-1-j][i]\n            matrix[n-1-j][i] = matrix[n-1-i][n-1-j]\n            matrix[n-1-i][n-1-j] = matrix[j][n-1-i]\n            matrix[j][n-1-i] = temp"},
            "49": {"title": "Group Anagrams", "difficulty": "Medium", "patterns": ["Hash Table", "String"], "bf_time": "O(n*k*log k)", "bf_space": "O(n*k)", "opt_time": "O(n*k)", "opt_space": "O(n*k)", "bf_points": ["For each pair of strings, check if anagrams", "Group matching anagrams", "Repeat until no merges possible"], "opt_points": ["For each string, create sorted key", "Use hash map: sorted_key -> list", "Return all values from hash map"], "bf_code": "def groupAnagrams(strs):\n    def are_anagrams(s1, s2):\n        return sorted(s1) == sorted(s2)\n    result = []\n    used = set()\n    for i in range(len(strs)):\n        if i not in used:\n            group = [strs[i]]\n            for j in range(i + 1, len(strs)):\n                if j not in used and are_anagrams(strs[i], strs[j]):\n                    group.append(strs[j])\n                    used.add(j)\n            result.append(group)\n    return result", "opt_code": "def groupAnagrams(strs):\n    anagrams = {}\n    for word in strs:\n        sorted_word = ''.join(sorted(word))\n        if sorted_word not in anagrams:\n            anagrams[sorted_word] = []\n        anagrams[sorted_word].append(word)\n    return list(anagrams.values())"},
            "53": {"title": "Maximum Subarray", "difficulty": "Medium", "patterns": ["Array", "Dynamic Programming"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Check all subarrays using nested loops", "Calculate sum of each subarray", "Track maximum sum"], "opt_points": ["Track currentMax and globalMax", "At each element: currentMax = max(nums[i], currentMax + nums[i])", "Update globalMax = max(globalMax, currentMax)"], "bf_code": "def maxSubArray(nums):\n    max_sum = float('-inf')\n    for i in range(len(nums)):\n        current_sum = 0\n        for j in range(i, len(nums)):\n            current_sum += nums[j]\n            max_sum = max(max_sum, current_sum)\n    return max_sum", "opt_code": "def maxSubArray(nums):\n    current_max = global_max = nums[0]\n    for num in nums[1:]:\n        current_max = max(num, current_max + num)\n        global_max = max(global_max, current_max)\n    return global_max"},
            "54": {"title": "Spiral Matrix", "difficulty": "Medium", "patterns": ["Matrix", "Array"], "bf_time": "O(m*n)", "bf_space": "O(m*n)", "opt_time": "O(m*n)", "opt_space": "O(1)", "bf_points": ["Track boundaries: top, bottom, left, right", "Traverse in spiral: right, down, left, up", "Shrink boundaries after each"], "opt_points": ["Use boundaries to track limits", "Traverse right → down → left → up", "Shrink boundary after traversal"], "bf_code": "def spiralOrder(matrix):\n    result = []\n    while matrix:\n        result.extend(matrix.pop(0))\n        if matrix and matrix[0]:\n            for row in matrix:\n                result.append(row.pop())\n        if matrix:\n            result.extend(reversed(matrix.pop()))\n        if matrix and matrix[0]:\n            for row in reversed(matrix):\n                result.append(row.pop(0))\n    return result", "opt_code": "def spiralOrder(matrix):\n    result = []\n    top, bottom = 0, len(matrix) - 1\n    left, right = 0, len(matrix[0]) - 1\n    while top <= bottom and left <= right:\n        for j in range(left, right + 1):\n            result.append(matrix[top][j])\n        top += 1\n        for i in range(top, bottom + 1):\n            result.append(matrix[i][right])\n        right -= 1\n        if top <= bottom:\n            for j in range(right, left - 1, -1):\n                result.append(matrix[bottom][j])\n            bottom -= 1\n        if left <= right:\n            for i in range(bottom, top - 1, -1):\n                result.append(matrix[i][left])\n            left += 1\n    return result"},
            "56": {"title": "Merge Intervals", "difficulty": "Medium", "patterns": ["Interval", "Sorting"], "bf_time": "O(n²)", "bf_space": "O(n)", "opt_time": "O(n log n)", "opt_space": "O(n)", "bf_points": ["Compare each interval with every other", "If two overlap, merge them", "Repeat until no more merges"], "opt_points": ["Sort intervals by start time", "Iterate and merge if current overlaps", "Add non-overlapping directly"], "bf_code": "def merge(intervals):\n    result = []\n    while intervals:\n        merged = False\n        for i in range(len(intervals)):\n            for j in range(i + 1, len(intervals)):\n                if intervals[i][1] >= intervals[j][0]:\n                    intervals[i] = [min(intervals[i][0], intervals[j][0]), max(intervals[i][1], intervals[j][1])]\n                    intervals.pop(j)\n                    merged = True\n                    break\n            if merged:\n                break\n        if not merged:\n            result.append(intervals.pop(0))\n    return result", "opt_code": "def merge(intervals):\n    intervals.sort()\n    result = [intervals[0]]\n    for current in intervals[1:]:\n        last = result[-1]\n        if current[0] <= last[1]:\n            result[-1] = [last[0], max(last[1], current[1])]\n        else:\n            result.append(current)\n    return result"},
            "108": {"title": "Convert Sorted Array to Binary Search Tree", "difficulty": "Easy", "patterns": ["Binary Tree", "DFS"], "bf_time": "O(n log n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(log n)", "bf_points": ["Find middle element as root", "Recursively build left subtree from left half", "Recursively build right subtree from right half"], "opt_points": ["Find middle using index calculation", "Use helper function with left and right pointers", "Recursively set middle as root node"], "bf_code": "class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef sortedArrayToBST(nums):\n    if not nums:\n        return None\n    mid = len(nums) // 2\n    root = TreeNode(nums[mid])\n    root.left = sortedArrayToBST(nums[:mid])\n    root.right = sortedArrayToBST(nums[mid+1:])\n    return root", "opt_code": "def sortedArrayToBST(nums):\n    def build(l, r):\n        if l > r:\n            return None\n        m = (l + r) // 2\n        node = TreeNode(nums[m])\n        node.left = build(l, m - 1)\n        node.right = build(m + 1, r)\n        return node\n    return build(0, len(nums) - 1)"},
            "112": {"title": "Path Sum", "difficulty": "Easy", "patterns": ["Binary Tree", "DFS"], "bf_time": "O(n)", "bf_space": "O(h)", "opt_time": "O(n)", "opt_space": "O(h)", "bf_points": ["Recursive DFS from root", "Subtract node value from target", "Check if leaf node reached with sum=0"], "opt_points": ["Use recursion with running sum", "Pass remaining sum down", "Base case: leaf with sum=0 returns True"], "bf_code": "def hasPathSum(root, target):\n    if not root:\n        return False\n    if not root.left and not root.right:\n        return root.val == target\n    return (hasPathSum(root.left, target - root.val) or\n            hasPathSum(root.right, target - root.val))", "opt_code": "def hasPathSum(root, target):\n    def dfs(node, remaining):\n        if not node:\n            return False\n        if not node.left and not node.right:\n            return node.val == remaining\n        return (dfs(node.left, remaining - node.val) or\n                dfs(node.right, remaining - node.val))\n    return dfs(root, target)"},
            "121": {"title": "Best Time to Buy and Sell Stock", "difficulty": "Easy", "patterns": ["Array", "Dynamic Programming"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Check every pair of buy/sell days", "For each day i, find max price after day i", "Track maximum profit"], "opt_points": ["Track minimum price seen so far", "For each price, calculate profit vs minimum", "Update maximum profit"], "bf_code": "def maxProfit(prices):\n    max_profit = 0\n    for i in range(len(prices)):\n        for j in range(i + 1, len(prices)):\n            profit = prices[j] - prices[i]\n            max_profit = max(max_profit, profit)\n    return max_profit", "opt_code": "def maxProfit(prices):\n    if not prices:\n        return 0\n    min_price = prices[0]\n    max_profit = 0\n    for price in prices[1:]:\n        max_profit = max(max_profit, price - min_price)\n        min_price = min(min_price, price)\n    return max_profit"},
            "122": {"title": "Best Time to Buy and Sell Stock II", "difficulty": "Medium", "patterns": ["Array", "Greedy"], "bf_time": "O(2^n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Try all possible buy/sell combinations", "Use recursion to explore paths", "Track maximum total profit"], "opt_points": ["Greedy: capture every upward slope", "Sum all positive differences", "Buy at local min, sell at local max"], "bf_code": "def maxProfit(prices):\n    def backtrack(index, buy, profit):\n        if index == len(prices):\n            return profit\n        if buy:\n            return max(backtrack(index+1, False, profit-prices[index]),\n                      backtrack(index+1, True, profit))\n        else:\n            return max(backtrack(index+1, True, profit+prices[index]),\n                      backtrack(index+1, False, profit))\n    return backtrack(0, True, 0)", "opt_code": "def maxProfit(prices):\n    profit = 0\n    for i in range(1, len(prices)):\n        if prices[i] > prices[i - 1]:\n            profit += prices[i] - prices[i - 1]\n    return profit"},
            "125": {"title": "Valid Palindrome", "difficulty": "Easy", "patterns": ["Two Pointer", "String"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Filter alphanumeric characters", "Convert to lowercase", "Check if filtered string equals reverse"], "opt_points": ["Use two pointers from ends", "Skip non-alphanumeric characters", "Compare characters while moving inward"], "bf_code": "def isPalindrome(s):\n    filtered = ''.join(c.lower() for c in s if c.isalnum())\n    return filtered == filtered[::-1]", "opt_code": "def isPalindrome(s):\n    left, right = 0, len(s) - 1\n    while left < right:\n        while left < right and not s[left].isalnum():\n            left += 1\n        while left < right and not s[right].isalnum():\n            right -= 1\n        if s[left].lower() != s[right].lower():\n            return False\n        left += 1\n        right -= 1\n    return True"},
            "127": {"title": "Word Ladder", "difficulty": "Hard", "patterns": ["BFS", "Graph", "Sliding Window"], "bf_time": "O(n*m*26)", "bf_space": "O(n*m)", "opt_time": "O(n*m*26)", "opt_space": "O(n*m)", "bf_points": ["Build graph of word transformations", "Each word is node, edge if differ by 1 char", "Use BFS to find shortest path"], "opt_points": ["BFS from start word", "For each word, try changing each char to a-z", "Find neighbors in word list"], "bf_code": "from collections import deque, defaultdict\ndef ladderLength(beginWord, endWord, wordList):\n    if endWord not in wordList:\n        return 0\n    word_set = set(wordList)\n    queue = deque([(beginWord, 1)])\n    visited = {beginWord}\n    while queue:\n        word, level = queue.popleft()\n        if word == endWord:\n            return level\n        for i in range(len(word)):\n            for c in 'abcdefghijklmnopqrstuvwxyz':\n                new_word = word[:i] + c + word[i+1:]\n                if new_word in word_set and new_word not in visited:\n                    visited.add(new_word)\n                    queue.append((new_word, level + 1))\n    return 0", "opt_code": "from collections import deque\ndef ladderLength(beginWord, endWord, wordList):\n    word_set = set(wordList)\n    if endWord not in word_set:\n        return 0\n    queue = deque([(beginWord, 1)])\n    visited = {beginWord}\n    while queue:\n        word, level = queue.popleft()\n        if word == endWord:\n            return level\n        for i in range(len(word)):\n            for c in 'abcdefghijklmnopqrstuvwxyz':\n                new_word = word[:i] + c + word[i+1:]\n                if new_word in word_set and new_word not in visited:\n                    visited.add(new_word)\n                    queue.append((new_word, level + 1))\n    return 0"},
            "128": {"title": "Longest Consecutive Sequence", "difficulty": "Medium", "patterns": ["Hash Table", "Array", "Bit Manipulation"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["For each number, search for consecutive", "Count consecutive sequence length", "Track maximum"], "opt_points": ["Store all numbers in a set", "For each number, only start count if it's sequence start", "Count consecutive numbers from set"], "bf_code": "def longestConsecutive(nums):\n    max_len = 0\n    for num in nums:\n        current = num\n        count = 1\n        while current + 1 in nums:\n            current += 1\n            count += 1\n        while current - 1 in nums:\n            current -= 1\n            count += 1\n        max_len = max(max_len, count)\n    return max_len", "opt_code": "def longestConsecutive(nums):\n    num_set = set(nums)\n    max_len = 0\n    for num in num_set:\n        if num - 1 not in num_set:\n            current = num\n            count = 1\n            while current + 1 in num_set:\n                current += 1\n                count += 1\n            max_len = max(max_len, count)\n    return max_len"},
            "134": {"title": "Gas Station", "difficulty": "Medium", "patterns": ["Array", "Greedy"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Try each starting position", "Simulate the journey", "Return starting position if complete"], "opt_points": ["Track total gas and cost", "If negative at position, start after", "Check if total gas >= total cost"], "bf_code": "def canCompleteCircuit(gas, cost):\n    for start in range(len(gas)):\n        current_gas = 0\n        valid = True\n        for i in range(len(gas)):\n            idx = (start + i) % len(gas)\n            current_gas += gas[idx] - cost[idx]\n            if current_gas < 0:\n                valid = False\n                break\n        if valid:\n            return start\n    return -1", "opt_code": "def canCompleteCircuit(gas, cost):\n    total_gas = sum(gas)\n    total_cost = sum(cost)\n    if total_gas < total_cost:\n        return -1\n    current_gas = 0\n    start = 0\n    for i in range(len(gas)):\n        current_gas += gas[i] - cost[i]\n        if current_gas < 0:\n            current_gas = 0\n            start = i + 1\n    return start"},
            "146": {"title": "LRU Cache", "difficulty": "Medium", "patterns": ["Design", "Hash Table", "Linked List"], "bf_time": "O(n)", "bf_space": "O(capacity)", "opt_time": "O(1)", "opt_space": "O(capacity)", "bf_points": ["Use list to track access order", "Remove least recently used item", "Search is slow O(n)"], "opt_points": ["Hash map + doubly linked list", "Hash map for O(1) access", "Linked list for O(1) add/remove"], "bf_code": "class LRUCache:\n    def __init__(self, capacity):\n        self.capacity = capacity\n        self.cache = {}\n        self.order = []\n    def get(self, key):\n        if key not in self.cache:\n            return -1\n        self.order.remove(key)\n        self.order.append(key)\n        return self.cache[key]\n    def put(self, key, value):\n        if key in self.cache:\n            self.order.remove(key)\n        elif len(self.cache) == self.capacity:\n            lru = self.order.pop(0)\n            del self.cache[lru]\n        self.cache[key] = value\n        self.order.append(key)", "opt_code": "class Node:\n    def __init__(self, key, val):\n        self.key = key\n        self.val = val\n        self.prev = None\n        self.next = None\n\nclass LRUCache:\n    def __init__(self, capacity):\n        self.capacity = capacity\n        self.cache = {}\n        self.head = Node(0, 0)\n        self.tail = Node(0, 0)\n        self.head.next = self.tail\n        self.tail.prev = self.head\n    def _add(self, node):\n        node.prev = self.head\n        node.next = self.head.next\n        self.head.next.prev = node\n        self.head.next = node\n    def _remove(self, node):\n        node.prev.next = node.next\n        node.next.prev = node.prev\n    def get(self, key):\n        if key not in self.cache:\n            return -1\n        node = self.cache[key]\n        self._remove(node)\n        self._add(node)\n        return node.val\n    def put(self, key, value):\n        if key in self.cache:\n            self._remove(self.cache[key])\n        node = Node(key, value)\n        self.cache[key] = node\n        self._add(node)\n        if len(self.cache) > self.capacity:\n            lru = self.tail.prev\n            self._remove(lru)\n            del self.cache[lru.key]"},
            "155": {"title": "Min Stack", "difficulty": "Medium", "patterns": ["Design", "Stack"], "bf_time": "O(1) push/pop, O(n) getMin", "bf_space": "O(n)", "opt_time": "O(1) all ops", "opt_space": "O(n)", "bf_points": ["Standard stack for values", "Traverse stack to find min on getMin call"], "opt_points": ["Two stacks: one for values, one for mins", "Min stack stores min at each level", "All operations O(1)"], "bf_code": "class MinStack:\n    def __init__(self):\n        self.stack = []\n    def push(self, val):\n        self.stack.append(val)\n    def pop(self):\n        return self.stack.pop()\n    def top(self):\n        return self.stack[-1]\n    def getMin(self):\n        return min(self.stack)", "opt_code": "class MinStack:\n    def __init__(self):\n        self.stack = []\n        self.min_stack = []\n    def push(self, val):\n        self.stack.append(val)\n        if not self.min_stack or val <= self.min_stack[-1]:\n            self.min_stack.append(val)\n    def pop(self):\n        if self.stack[-1] == self.min_stack[-1]:\n            self.min_stack.pop()\n        return self.stack.pop()\n    def top(self):\n        return self.stack[-1]\n    def getMin(self):\n        return self.min_stack[-1]"},
            "189": {"title": "Rotate Array", "difficulty": "Medium", "patterns": ["Array"], "bf_time": "O(n*k)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["For k times, move last element to front", "Repeat rotation k times"], "opt_points": ["Reverse entire array", "Reverse first k elements", "Reverse remaining elements"], "bf_code": "def rotate(nums, k):\n    k = k % len(nums)\n    for _ in range(k):\n        nums.insert(0, nums.pop())", "opt_code": "def rotate(nums, k):\n    k = k % len(nums)\n    def reverse(l, r):\n        while l < r:\n            nums[l], nums[r] = nums[r], nums[l]\n            l += 1\n            r -= 1\n    reverse(0, len(nums) - 1)\n    reverse(0, k - 1)\n    reverse(k, len(nums) - 1)"},
            "200": {"title": "Number of Islands", "difficulty": "Medium", "patterns": ["Graph", "DFS"], "bf_time": "O(m*n)", "bf_space": "O(m*n)", "opt_time": "O(m*n)", "opt_space": "O(min(m,n))", "bf_points": ["Iterate through grid", "For each '1', do DFS and mark as visited", "Increment island count"], "opt_points": ["Use DFS with marking in place", "Mark visited cells as '0'", "Count number of DFS starts"], "bf_code": "def numIslands(grid):\n    visited = set()\n    def dfs(i, j):\n        if i < 0 or i >= len(grid) or j < 0 or j >= len(grid[0]):\n            return\n        if (i, j) in visited or grid[i][j] == '0':\n            return\n        visited.add((i, j))\n        dfs(i+1, j)\n        dfs(i-1, j)\n        dfs(i, j+1)\n        dfs(i, j-1)\n    count = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j] == '1' and (i, j) not in visited:\n                dfs(i, j)\n                count += 1\n    return count", "opt_code": "def numIslands(grid):\n    def dfs(i, j):\n        if i < 0 or i >= len(grid) or j < 0 or j >= len(grid[0]) or grid[i][j] == '0':\n            return\n        grid[i][j] = '0'\n        dfs(i+1, j)\n        dfs(i-1, j)\n        dfs(i, j+1)\n        dfs(i, j-1)\n    count = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j] == '1':\n                dfs(i, j)\n                count += 1\n    return count"},
            "206": {"title": "Reverse Linked List", "difficulty": "Easy", "patterns": ["Linked List"], "bf_time": "O(n)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Iteratively reverse pointers", "prev -> current -> next", "Update pointers one by one"], "opt_points": ["Recursively reverse rest of list", "Connect current to next's next", "Update pointers"], "bf_code": "def reverseList(head):\n    prev = None\n    current = head\n    while current:\n        next_temp = current.next\n        current.next = prev\n        prev = current\n        current = next_temp\n    return prev", "opt_code": "def reverseList(head):\n    def reverse(node):\n        if not node or not node.next:\n            return node\n        new_head = reverse(node.next)\n        node.next.next = node\n        node.next = None\n        return new_head\n    return reverse(head)"},
            "207": {"title": "Course Schedule", "difficulty": "Medium", "patterns": ["Graph", "DFS"], "bf_time": "O(V+E)", "bf_space": "O(V+E)", "opt_time": "O(V+E)", "opt_space": "O(V+E)", "bf_points": ["Build adjacency list", "Use DFS to detect cycle", "Return true if no cycle"], "opt_points": ["Color nodes: white, gray, black", "Gray nodes are in current path", "Black nodes are fully processed"], "bf_code": "def canFinish(numCourses, prerequisites):\n    from collections import defaultdict\n    graph = defaultdict(list)\n    for course, prereq in prerequisites:\n        graph[course].append(prereq)\n    visited = set()\n    rec_stack = set()\n    def has_cycle(node):\n        visited.add(node)\n        rec_stack.add(node)\n        for neighbor in graph[node]:\n            if neighbor not in visited:\n                if has_cycle(neighbor):\n                    return True\n            elif neighbor in rec_stack:\n                return True\n        rec_stack.remove(node)\n        return False\n    for course in range(numCourses):\n        if course not in visited:\n            if has_cycle(course):\n                return False\n    return True", "opt_code": "def canFinish(numCourses, prerequisites):\n    from collections import defaultdict\n    graph = defaultdict(list)\n    in_degree = [0] * numCourses\n    for course, prereq in prerequisites:\n        graph[prereq].append(course)\n        in_degree[course] += 1\n    queue = [i for i in range(numCourses) if in_degree[i] == 0]\n    count = 0\n    while queue:\n        course = queue.pop(0)\n        count += 1\n        for neighbor in graph[course]:\n            in_degree[neighbor] -= 1\n            if in_degree[neighbor] == 0:\n                queue.append(neighbor)\n    return count == numCourses"},
            "210": {"title": "Course Schedule II", "difficulty": "Medium", "patterns": ["Graph", "DFS"], "bf_time": "O(V+E)", "bf_space": "O(V+E)", "opt_time": "O(V+E)", "opt_space": "O(V+E)", "bf_points": ["Build adjacency list", "Topological sort with DFS", "Return order if no cycle"], "opt_points": ["Use Kahn's algorithm", "Decrement in-degrees", "Output topological order"], "bf_code": "def findOrder(numCourses, prerequisites):\n    from collections import defaultdict\n    graph = defaultdict(list)\n    visited = [0] * numCourses\n    stack = []\n    def dfs(node):\n        if visited[node] == 1:\n            return False\n        if visited[node] == 2:\n            return True\n        visited[node] = 1\n        for neighbor in graph[node]:\n            if not dfs(neighbor):\n                return False\n        visited[node] = 2\n        stack.append(node)\n        return True\n    for course, prereq in prerequisites:\n        graph[course].append(prereq)\n    for i in range(numCourses):\n        if visited[i] == 0:\n            if not dfs(i):\n                return []\n    return stack", "opt_code": "def findOrder(numCourses, prerequisites):\n    from collections import defaultdict, deque\n    graph = defaultdict(list)\n    in_degree = [0] * numCourses\n    for course, prereq in prerequisites:\n        graph[prereq].append(course)\n        in_degree[course] += 1\n    queue = deque([i for i in range(numCourses) if in_degree[i] == 0])\n    result = []\n    while queue:\n        course = queue.popleft()\n        result.append(course)\n        for neighbor in graph[course]:\n            in_degree[neighbor] -= 1\n            if in_degree[neighbor] == 0:\n                queue.append(neighbor)\n    return result if len(result) == numCourses else []"},
            "211": {"title": "Design Add and Search Words Data Structure", "difficulty": "Medium", "patterns": ["Design", "Trie", "DFS", "Sliding Window"], "bf_time": "O(n*m) search", "bf_space": "O(n*m)", "opt_time": "O(m) add, O(26^k) search", "opt_space": "O(n*m)", "bf_points": ["Store all words in a list", "Search by checking all words", "Slow for many words"], "opt_points": ["Use Trie structure", "Add inserts into trie", "Search with wildcard handling"], "bf_code": "class WordDictionary:\n    def __init__(self):\n        self.words = set()\n    def addWord(self, word):\n        self.words.add(word)\n    def search(self, word):\n        for w in self.words:\n            if len(w) == len(word):\n                match = True\n                for i in range(len(word)):\n                    if word[i] != '.' and word[i] != w[i]:\n                        match = False\n                        break\n                if match:\n                    return True\n        return False", "opt_code": "class TrieNode:\n    def __init__(self):\n        self.children = {}\n        self.is_word = False\n\nclass WordDictionary:\n    def __init__(self):\n        self.root = TrieNode()\n    def addWord(self, word):\n        node = self.root\n        for c in word:\n            if c not in node.children:\n                node.children[c] = TrieNode()\n            node = node.children[c]\n        node.is_word = True\n    def search(self, word):\n        def dfs(node, index):\n            if index == len(word):\n                return node.is_word\n            c = word[index]\n            if c == '.':\n                for child in node.children.values():\n                    if dfs(child, index + 1):\n                        return True\n            elif c in node.children:\n                return dfs(node.children[c], index + 1)\n            return False\n        return dfs(self.root, 0)"},
            "227": {"title": "Basic Calculator II", "difficulty": "Medium", "patterns": ["Stack", "String"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Parse string character by character", "Handle operators in order", "Keep track of operations"], "opt_points": ["Use stack to handle precedence", "Process * and / immediately", "Add/subtract to stack"], "bf_code": "def calculate(s):\n    stack = []\n    num = 0\n    operator = '+'\n    for i, c in enumerate(s):\n        if c.isdigit():\n            num = num * 10 + int(c)\n        if c in '+-*/' or i == len(s) - 1:\n            if operator == '+':\n                stack.append(num)\n            elif operator == '-':\n                stack.append(-num)\n            elif operator == '*':\n                stack.append(stack.pop() * num)\n            elif operator == '/':\n                stack.append(int(stack.pop() / num))\n            if c in '+-*/':\n                operator = c\n            num = 0\n    return sum(stack)", "opt_code": "def calculate(s):\n    stack = []\n    num = 0\n    operator = '+'\n    for i, c in enumerate(s):\n        if c.isdigit():\n            num = num * 10 + int(c)\n        if c in '+-*/' or i == len(s) - 1:\n            if operator == '+':\n                stack.append(num)\n            elif operator == '-':\n                stack.append(-num)\n            elif operator == '*':\n                stack.append(stack.pop() * num)\n            else:\n                stack.append(int(stack.pop() / num))\n            if i < len(s) - 1 and c in '+-*/':\n                operator = c\n            num = 0\n    return sum(stack)"},
            "238": {"title": "Product of Array Except Self", "difficulty": "Medium", "patterns": ["Array"], "bf_time": "O(n²)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["For each index, calculate product of all others", "Use nested loop to multiply others", "Track result in output array"], "opt_points": ["Create prefix products array", "Create suffix products array", "Multiply prefix[i-1] * suffix[i+1]"], "bf_code": "def productExceptSelf(nums):\n    result = []\n    for i in range(len(nums)):\n        product = 1\n        for j in range(len(nums)):\n            if i != j:\n                product *= nums[j]\n        result.append(product)\n    return result", "opt_code": "def productExceptSelf(nums):\n    n = len(nums)\n    result = [1] * n\n    for i in range(1, n):\n        result[i] = result[i - 1] * nums[i - 1]\n    right_product = 1\n    for i in range(n - 1, -1, -1):\n        result[i] = result[i] * right_product\n        right_product *= nums[i]\n    return result"},
            "252": {"title": "Meeting Rooms", "difficulty": "Easy", "patterns": ["Interval", "Sorting"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n log n)", "opt_space": "O(1)", "bf_points": ["Check every pair of intervals", "If overlap, return false"], "opt_points": ["Sort by start time", "Check consecutive meetings"], "bf_code": "def canAttendMeetings(intervals):\n    for i in range(len(intervals)):\n        for j in range(i + 1, len(intervals)):\n            if intervals[i][1] > intervals[j][0] and intervals[i][0] < intervals[j][1]:\n                return False\n    return True", "opt_code": "def canAttendMeetings(intervals):\n    intervals.sort()\n    for i in range(len(intervals) - 1):\n        if intervals[i][1] > intervals[i + 1][0]:\n            return False\n    return True"},
            "253": {"title": "Meeting Rooms II", "difficulty": "Medium", "patterns": ["Interval", "Heap"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n log n)", "opt_space": "O(n)", "bf_points": ["Check overlap for every pair", "Count overlaps at each point"], "opt_points": ["Use min-heap for end times", "Sort by start time", "Track rooms needed"], "bf_code": "def minMeetingRooms(intervals):\n    count = 0\n    for i in range(len(intervals)):\n        current_count = 0\n        for j in range(len(intervals)):\n            if intervals[j][0] < intervals[i][1] and intervals[i][0] < intervals[j][1]:\n                current_count += 1\n        count = max(count, current_count)\n    return count", "opt_code": "import heapq\ndef minMeetingRooms(intervals):\n    intervals.sort()\n    heap = []\n    for start, end in intervals:\n        if heap and heap[0] <= start:\n            heapq.heapreplace(heap, end)\n        else:\n            heapq.heappush(heap, end)\n    return len(heap)"},
            "284": {"title": "Peeking Iterator", "difficulty": "Medium", "patterns": ["Design", "Iterator", "Sliding Window"], "bf_time": "O(n) init, O(1) ops", "bf_space": "O(n)", "opt_time": "O(1) all ops", "opt_space": "O(1)", "bf_points": ["Store all elements in memory", "Maintain index for iteration"], "opt_points": ["Peek at next without advancing", "Cache next value", "Lazy evaluation"], "bf_code": "class PeekingIterator:\n    def __init__(self, iterator):\n        self.iterator = iterator\n        self.values = list(iterator)\n        self.index = 0\n    def peek(self):\n        return self.values[self.index]\n    def next(self):\n        val = self.values[self.index]\n        self.index += 1\n        return val\n    def hasNext(self):\n        return self.index < len(self.values)", "opt_code": "class PeekingIterator:\n    def __init__(self, iterator):\n        self.iterator = iterator\n        self.peeked = None\n        self.has_peeked = False\n    def peek(self):\n        if not self.has_peeked:\n            self.peeked = self.iterator.next()\n            self.has_peeked = True\n        return self.peeked\n    def next(self):\n        if self.has_peeked:\n            val = self.peeked\n            self.has_peeked = False\n            return val\n        return self.iterator.next()\n    def hasNext(self):\n        return self.has_peeked or self.iterator.hasNext()"},
            "295": {"title": "Find Median from Data Stream", "difficulty": "Hard", "patterns": ["Design", "Heap"], "bf_time": "O(n log n)", "bf_space": "O(n)", "opt_time": "O(log n) add, O(1) median", "opt_space": "O(n)", "bf_points": ["Store numbers in list", "Sort on each access", "Get middle element"], "opt_points": ["Max heap (left) for smaller half", "Min heap (right) for larger half", "Balance sizes"], "bf_code": "class MedianFinder:\n    def __init__(self):\n        self.nums = []\n    def addNum(self, num):\n        self.nums.append(num)\n    def findMedian(self):\n        self.nums.sort()\n        n = len(self.nums)\n        if n % 2 == 1:\n            return float(self.nums[n // 2])\n        return (self.nums[n // 2 - 1] + self.nums[n // 2]) / 2.0", "opt_code": "import heapq\nclass MedianFinder:\n    def __init__(self):\n        self.small = []\n        self.large = []\n    def addNum(self, num):\n        heapq.heappush(self.small, -num)\n        if self.small and self.large and (-self.small[0] > self.large[0]):\n            val = -heapq.heappop(self.small)\n            heapq.heappush(self.large, val)\n        if len(self.small) > len(self.large) + 1:\n            val = -heapq.heappop(self.small)\n            heapq.heappush(self.large, val)\n        if len(self.large) > len(self.small):\n            val = heapq.heappop(self.large)\n            heapq.heappush(self.small, -val)\n    def findMedian(self):\n        if len(self.small) > len(self.large):\n            return float(-self.small[0])\n        return (-self.small[0] + self.large[0]) / 2.0"},
            "297": {"title": "Serialize and Deserialize Binary Tree", "difficulty": "Hard", "patterns": ["Design", "Binary Tree", "DFS"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Preorder traversal for serialization", "Null markers for leaf children", "Reconstruct from markers"], "opt_points": ["DFS preorder with null markers", "Split by delimiter", "Recursively rebuild tree"], "bf_code": "class Codec:\n    def serialize(self, root):\n        result = []\n        def dfs(node):\n            if not node:\n                result.append('#')\n                return\n            result.append(str(node.val))\n            dfs(node.left)\n            dfs(node.right)\n        dfs(root)\n        return ','.join(result)\n    def deserialize(self, data):\n        values = data.split(',')\n        self.index = 0\n        def dfs():\n            if values[self.index] == '#':\n                self.index += 1\n                return None\n            node = TreeNode(int(values[self.index]))\n            self.index += 1\n            node.left = dfs()\n            node.right = dfs()\n            return node\n        return dfs()", "opt_code": "class Codec:\n    def serialize(self, root):\n        result = []\n        def dfs(node):\n            if not node:\n                result.append(None)\n                return\n            result.append(node.val)\n            dfs(node.left)\n            dfs(node.right)\n        dfs(root)\n        return result\n    def deserialize(self, data):\n        self.index = 0\n        def dfs():\n            if self.index >= len(data) or data[self.index] is None:\n                self.index += 1\n                return None\n            node = TreeNode(data[self.index])\n            self.index += 1\n            node.left = dfs()\n            node.right = dfs()\n            return node\n        return dfs()"},
            "341": {"title": "Flatten Nested List Iterator", "difficulty": "Medium", "patterns": ["Design", "Stack", "Iterator"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Flatten entire list upfront", "Iterate through flattened list"], "opt_points": ["Use stack for lazy evaluation", "Process on demand", "Save space with iterator pattern"], "bf_code": "class NestedIterator:\n    def __init__(self, nestedList):\n        self.flattened = []\n        def flatten(lst):\n            for item in lst:\n                if isinstance(item, int):\n                    self.flattened.append(item)\n                else:\n                    flatten(item)\n        flatten(nestedList)\n        self.index = 0\n    def next(self):\n        val = self.flattened[self.index]\n        self.index += 1\n        return val\n    def hasNext(self):\n        return self.index < len(self.flattened)", "opt_code": "class NestedIterator:\n    def __init__(self, nestedList):\n        self.stack = list(reversed(nestedList))\n    def next(self):\n        return self.stack.pop()\n    def hasNext(self):\n        while self.stack:\n            top = self.stack[-1]\n            if isinstance(top, int):\n                return True\n            self.stack.pop()\n            for item in reversed(top):\n                self.stack.append(item)\n        return False"},
            "347": {"title": "Top K Frequent Elements", "difficulty": "Medium", "patterns": ["Hash Table", "Heap"], "bf_time": "O(n log n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Count frequencies", "Sort by frequency", "Return top k"], "opt_points": ["Use heap with size k", "Maintain min-heap of k elements", "Time: O(n log k)"], "bf_code": "from collections import Counter\ndef topKFrequent(nums, k):\n    count = Counter(nums)\n    sorted_items = sorted(count.items(), key=lambda x: x[1], reverse=True)\n    return [item[0] for item in sorted_items[:k]]", "opt_code": "from collections import Counter\nimport heapq\ndef topKFrequent(nums, k):\n    count = Counter(nums)\n    heap = []\n    for num, freq in count.items():\n        heapq.heappush(heap, (-freq, num))\n    return [heapq.heappop(heap)[1] for _ in range(k)]"},
            "349": {"title": "Intersection of Two Arrays", "difficulty": "Easy", "patterns": ["Hash Table", "Array"], "bf_time": "O(m*n)", "bf_space": "O(min(m,n))", "opt_time": "O(m+n)", "opt_space": "O(min(m,n))", "bf_points": ["For each element in nums1", "Check if in nums2"], "opt_points": ["Store nums1 in set", "Check nums2 against set", "Return intersection"], "bf_code": "def intersection(nums1, nums2):\n    result = []\n    for num in nums1:\n        if num in nums2 and num not in result:\n            result.append(num)\n    return result", "opt_code": "def intersection(nums1, nums2):\n    set1 = set(nums1)\n    return list(set(num for num in nums2 if num in set1))"},
