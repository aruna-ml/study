            "380": {"title": "Insert Delete GetRandom O(1)", "difficulty": "Medium", "patterns": ["Design", "Hash Table"], "bf_time": "O(n) remove", "bf_space": "O(n)", "opt_time": "O(1) avg all ops", "opt_space": "O(n)", "bf_points": ["List + set for tracking", "Remove and search slow"], "opt_points": ["List for values, dict for indices", "Swap with last for O(1) remove", "Random index for getRandom"], "bf_code": "import random\nclass RandomizedSet:\n    def __init__(self):\n        self.values = []\n        self.indices = {}\n    def insert(self, val):\n        if val in self.indices:\n            return False\n        self.indices[val] = len(self.values)\n        self.values.append(val)\n        return True\n    def remove(self, val):\n        if val not in self.indices:\n            return False\n        idx = self.indices[val]\n        last = self.values[-1]\n        self.values[idx] = last\n        self.indices[last] = idx\n        self.values.pop()\n        del self.indices[val]\n        return True\n    def getRandom(self):\n        return random.choice(self.values)", "opt_code": "import random\nclass RandomizedSet:\n    def __init__(self):\n        self.values = []\n        self.indices = {}\n    def insert(self, val):\n        if val in self.indices:\n            return False\n        self.indices[val] = len(self.values)\n        self.values.append(val)\n        return True\n    def remove(self, val):\n        if val not in self.indices:\n            return False\n        idx = self.indices[val]\n        last = self.values[-1]\n        self.values[idx] = last\n        self.indices[last] = idx\n        del self.indices[val]\n        self.values.pop()\n        return True\n    def getRandom(self):\n        return random.choice(self.values)"},
            "394": {"title": "Decode String", "difficulty": "Medium", "patterns": ["Stack", "String"], "bf_time": "O(n*maxNesting)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["Recursive decoding", "Handle nested brackets"], "opt_points": ["Stack-based approach", "Track number and string separately", "Build result on bracket close"], "bf_code": "def decodeString(s):\n    def decode(index):\n        result = ''\n        num = 0\n        while index < len(s):\n            if s[index].isdigit():\n                num = num * 10 + int(s[index])\n            elif s[index] == '[':\n                substring, index = decode(index + 1)\n                result += substring * num\n                num = 0\n            elif s[index] == ']':\n                return result, index\n            else:\n                result += s[index]\n            index += 1\n        return result, index\n    return decode(0)[0]", "opt_code": "def decodeString(s):\n    stack = []\n    for c in s:\n        if c != ']':\n            stack.append(c)\n        else:\n            string = ''\n            while stack[-1] != '[':\n                string = stack.pop() + string\n            stack.pop()\n            num = ''\n            while stack and stack[-1].isdigit():\n                num = stack.pop() + num\n            stack.append(string * int(num))\n    return ''.join(stack)"},
            "412": {"title": "Fizz Buzz", "difficulty": "Easy", "patterns": ["Math", "String"], "bf_time": "O(n)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Iterate from 1 to n", "Check divisibility by 3 and 5"], "opt_points": ["Same logic, cleaner code"], "bf_code": "def fizzBuzz(n):\n    result = []\n    for i in range(1, n + 1):\n        if i % 15 == 0:\n            result.append('FizzBuzz')\n        elif i % 3 == 0:\n            result.append('Fizz')\n        elif i % 5 == 0:\n            result.append('Buzz')\n        else:\n            result.append(str(i))\n    return result", "opt_code": "def fizzBuzz(n):\n    result = []\n    for i in range(1, n + 1):\n        s = ''\n        if i % 3 == 0:\n            s += 'Fizz'\n        if i % 5 == 0:\n            s += 'Buzz'\n        result.append(s if s else str(i))\n    return result"},
            "622": {"title": "Design Circular Queue", "difficulty": "Medium", "patterns": ["Design"], "bf_time": "O(1) all ops", "bf_space": "O(k)", "opt_time": "O(1) all ops", "opt_space": "O(k)", "bf_points": ["Fixed-size array", "Head and tail pointers", "Wrap around on boundaries"], "opt_points": ["Circular array implementation", "Track size explicitly", "Handle wrap-around"], "bf_code": "class MyCircularQueue:\n    def __init__(self, k):\n        self.queue = [0] * k\n        self.size = 0\n        self.k = k\n        self.head = 0\n    def enQueue(self, value):\n        if self.size == self.k:\n            return False\n        idx = (self.head + self.size) % self.k\n        self.queue[idx] = value\n        self.size += 1\n        return True\n    def deQueue(self):\n        if self.size == 0:\n            return False\n        self.head = (self.head + 1) % self.k\n        self.size -= 1\n        return True\n    def Front(self):\n        return -1 if self.size == 0 else self.queue[self.head]\n    def Rear(self):\n        return -1 if self.size == 0 else self.queue[(self.head + self.size - 1) % self.k]\n    def isEmpty(self):\n        return self.size == 0\n    def isFull(self):\n        return self.size == self.k", "opt_code": "class MyCircularQueue:\n    def __init__(self, k):\n        self.queue = [0] * k\n        self.size = 0\n        self.k = k\n        self.head = 0\n    def enQueue(self, value):\n        if self.size == self.k:\n            return False\n        idx = (self.head + self.size) % self.k\n        self.queue[idx] = value\n        self.size += 1\n        return True\n    def deQueue(self):\n        if self.size == 0:\n            return False\n        self.head = (self.head + 1) % self.k\n        self.size -= 1\n        return True\n    def Front(self):\n        return -1 if self.size == 0 else self.queue[self.head]\n    def Rear(self):\n        return -1 if self.size == 0 else self.queue[(self.head + self.size - 1) % self.k]\n    def isEmpty(self):\n        return self.size == 0\n    def isFull(self):\n        return self.size == self.k"},
            "706": {"title": "Design HashMap", "difficulty": "Easy", "patterns": ["Design", "Hash Table"], "bf_time": "O(n) put/get", "bf_space": "O(n)", "opt_time": "O(1) avg", "opt_space": "O(n)", "bf_points": ["List of key-value pairs", "Linear search on get/put"], "opt_points": ["Hash function with chaining", "Bucket-based storage"], "bf_code": "class MyHashMap:\n    def __init__(self):\n        self.data = []\n    def put(self, key, value):\n        for i, (k, v) in enumerate(self.data):\n            if k == key:\n                self.data[i] = (key, value)\n                return\n        self.data.append((key, value))\n    def get(self, key):\n        for k, v in self.data:\n            if k == key:\n                return v\n        return -1\n    def remove(self, key):\n        self.data = [(k, v) for k, v in self.data if k != key]", "opt_code": "class MyHashMap:\n    def __init__(self):\n        self.size = 1000\n        self.buckets = [[] for _ in range(self.size)]\n    def _hash(self, key):\n        return key % self.size\n    def put(self, key, value):\n        idx = self._hash(key)\n        for i, (k, v) in enumerate(self.buckets[idx]):\n            if k == key:\n                self.buckets[idx][i] = (key, value)\n                return\n        self.buckets[idx].append((key, value))\n    def get(self, key):\n        idx = self._hash(key)\n        for k, v in self.buckets[idx]:\n            if k == key:\n                return v\n        return -1\n    def remove(self, key):\n        idx = self._hash(key)\n        self.buckets[idx] = [(k, v) for k, v in self.buckets[idx] if k != key]"},
            "713": {"title": "Subarray Product Less Than K", "difficulty": "Medium", "patterns": ["Two Pointer", "Array"], "bf_time": "O(n²)", "bf_space": "O(1)", "opt_time": "O(n)", "opt_space": "O(1)", "bf_points": ["Check every subarray", "Count products < k"], "opt_points": ["Two pointer sliding window", "Expand right, shrink left"], "bf_code": "def numSubarrayProductLessThanK(nums, k):\n    if k <= 1:\n        return 0\n    count = 0\n    for i in range(len(nums)):\n        product = 1\n        for j in range(i, len(nums)):\n            product *= nums[j]\n            if product < k:\n                count += 1\n            else:\n                break\n    return count", "opt_code": "def numSubarrayProductLessThanK(nums, k):\n    if k <= 1:\n        return 0\n    count = 0\n    product = 1\n    left = 0\n    for right in range(len(nums)):\n        product *= nums[right]\n        while product >= k:\n            product //= nums[left]\n            left += 1\n        count += right - left + 1\n    return count"},
            "733": {"title": "Flood Fill", "difficulty": "Easy", "patterns": ["Graph", "DFS"], "bf_time": "O(m*n)", "bf_space": "O(m*n)", "opt_time": "O(m*n)", "opt_space": "O(m*n)", "bf_points": ["DFS from starting position", "Change color and recurse to neighbors"], "opt_points": ["Same DFS approach"], "bf_code": "def floodFill(image, sr, sc, newColor):\n    original_color = image[sr][sc]\n    if original_color == newColor:\n        return image\n    def dfs(i, j):\n        if i < 0 or i >= len(image) or j < 0 or j >= len(image[0]):\n            return\n        if image[i][j] != original_color:\n            return\n        image[i][j] = newColor\n        dfs(i+1, j)\n        dfs(i-1, j)\n        dfs(i, j+1)\n        dfs(i, j-1)\n    dfs(sr, sc)\n    return image", "opt_code": "def floodFill(image, sr, sc, newColor):\n    original_color = image[sr][sc]\n    if original_color == newColor:\n        return image\n    def dfs(i, j):\n        if i < 0 or i >= len(image) or j < 0 or j >= len(image[0]) or image[i][j] != original_color:\n            return\n        image[i][j] = newColor\n        dfs(i+1, j)\n        dfs(i-1, j)\n        dfs(i, j+1)\n        dfs(i, j-1)\n    dfs(sr, sc)\n    return image"},
            "876": {"title": "Middle of the Linked List", "difficulty": "Easy", "patterns": ["Linked List", "Two Pointer"], "bf_time": "O(n) two-pass", "bf_space": "O(1)", "opt_time": "O(n) single-pass", "opt_space": "O(1)", "bf_points": ["Count total nodes", "Get node at n/2"], "opt_points": ["Slow and fast pointers", "Fast moves 2x speed", "Return slow when fast reaches end"], "bf_code": "def middleNode(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    return slow", "opt_code": "def middleNode(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    return slow"},
            "981": {"title": "Time Based Key-Value Store", "difficulty": "Medium", "patterns": ["Design", "Binary Search"], "bf_time": "O(n) get", "bf_space": "O(n)", "opt_time": "O(log n) get", "opt_space": "O(n)", "bf_points": ["Linear search through timestamps", "Find exact or closest match"], "opt_points": ["Binary search on timestamps", "Keep list of (timestamp, value) pairs"], "bf_code": "class TimeMap:\n    def __init__(self):\n        self.store = {}\n    def set(self, key, value, timestamp):\n        if key not in self.store:\n            self.store[key] = []\n        self.store[key].append((timestamp, value))\n    def get(self, key, timestamp):\n        if key not in self.store:\n            return ''\n        for t, v in reversed(self.store[key]):\n            if t <= timestamp:\n                return v\n        return ''", "opt_code": "import bisect\nclass TimeMap:\n    def __init__(self):\n        self.store = {}\n    def set(self, key, value, timestamp):\n        if key not in self.store:\n            self.store[key] = ([], [])\n        times, values = self.store[key]\n        times.append(timestamp)\n        values.append(value)\n    def get(self, key, timestamp):\n        if key not in self.store:\n            return ''\n        times, values = self.store[key]\n        idx = bisect.bisect_right(times, timestamp) - 1\n        return values[idx] if idx >= 0 else ''"},
            "1047": {"title": "Remove All Adjacent Duplicates In String", "difficulty": "Easy", "patterns": ["Stack", "String"], "bf_time": "O(n²)", "bf_space": "O(n)", "opt_time": "O(n)", "opt_space": "O(n)", "bf_points": ["While adjacent duplicates exist", "Remove them"], "opt_points": ["Stack for characters", "Pop if matches top"], "bf_code": "def removeDuplicates(s):\n    result = list(s)\n    i = 0\n    while i < len(result) - 1:\n        if result[i] == result[i + 1]:\n            result.pop(i)\n            result.pop(i)\n            i = max(0, i - 1)\n        else:\n            i += 1\n    return ''.join(result)", "opt_code": "def removeDuplicates(s):\n    stack = []\n    for c in s:\n        if stack and stack[-1] == c:\n            stack.pop()\n        else:\n            stack.append(c)\n    return ''.join(stack)"},
            "1146": {"title": "Snapshot Array", "difficulty": "Medium", "patterns": ["Design", "Binary Search"], "bf_time": "O(snap*n)", "bf_space": "O(n*snaps)", "opt_time": "O(log snaps)", "opt_space": "O(n+snaps)", "bf_points": ["Store full array copy per snapshot", "Memory intensive"], "opt_points": ["Only store changes per index", "Binary search to find value at snapshot"], "bf_code": "class SnapshotArray:\n    def __init__(self, length):\n        self.array = [0] * length\n        self.snapshots = []\n    def set(self, index, val):\n        self.array[index] = val\n    def snap(self):\n        self.snapshots.append(self.array[:])\n        return len(self.snapshots) - 1\n    def get(self, index, snap_id):\n        return self.snapshots[snap_id][index]", "opt_code": "import bisect\nclass SnapshotArray:\n    def __init__(self, length):\n        self.history = [[] for _ in range(length)]\n        self.snap_id = 0\n    def set(self, index, val):\n        if self.history[index] and self.history[index][-1][0] == self.snap_id:\n            self.history[index][-1] = (self.snap_id, val)\n        else:\n            self.history[index].append((self.snap_id, val))\n    def snap(self):\n        self.snap_id += 1\n        return self.snap_id - 1\n    def get(self, index, snap_id):\n        history = self.history[index]\n        idx = bisect.bisect_right(history, (snap_id, float('inf'))) - 1\n        return history[idx][1] if idx >= 0 else 0"},
            "2065": {"title": "Maximum Path Quality of a Graph", "difficulty": "Hard", "patterns": ["Graph", "DFS", "BFS", "Sliding Window"], "bf_time": "O(V^V)", "bf_space": "O(V+E)", "opt_time": "O(V^V) with pruning", "opt_space": "O(V+E)", "bf_points": ["DFS from start node", "Track visited nodes", "Maximize quality sum"], "opt_points": ["DFS with early termination", "Track paths within time limit", "Prune suboptimal paths"], "bf_code": "def maximalPathQuality(values, edges, maxTime):\n    from collections import defaultdict\n    graph = defaultdict(list)\n    for u, v, t in edges:\n        graph[u].append((v, t))\n        graph[v].append((u, t))\n    max_quality = [values[0]]\n    def dfs(node, time, quality, visited):\n        if time < 0:\n            return\n        if node == 0:\n            max_quality[0] = max(max_quality[0], quality)\n        for neighbor, t in graph[node]:\n            if t <= time:\n                if neighbor not in visited:\n                    visited.add(neighbor)\n                    dfs(neighbor, time - t, quality + values[neighbor], visited)\n                    visited.remove(neighbor)\n    visited = {0}\n    dfs(0, maxTime, values[0], visited)\n    return max_quality[0]", "opt_code": "def maximalPathQuality(values, edges, maxTime):\n    from collections import defaultdict\n    graph = defaultdict(list)\n    for u, v, t in edges:\n        graph[u].append((v, t))\n        graph[v].append((u, t))\n    max_quality = [values[0]]\n    def dfs(node, time, quality, visited):\n        if node == 0 and len(visited) > 1:\n            max_quality[0] = max(max_quality[0], quality)\n        for neighbor, t in graph[node]:\n            if t <= time:\n                if neighbor not in visited:\n                    visited.add(neighbor)\n                    dfs(neighbor, time - t, quality + values[neighbor], visited)\n                    visited.remove(neighbor)\n    visited = {0}\n    dfs(0, maxTime, values[0], visited)\n    return max_quality[0]"},
            "2435": {"title": "Paths in Matrix Divisible by K", "difficulty": "Hard", "patterns": ["Dynamic Programming", "Matrix"], "bf_time": "O(m*n*k)", "bf_space": "O(m*n*k)", "opt_time": "O(m*n*k)", "opt_space": "O(n*k)", "bf_points": ["3D DP: row, col, remainder", "Count paths with remainder 0"], "opt_points": ["Space optimization with rolling array", "DP state: position and mod k"], "bf_code": "def numberOfPaths(grid, k):\n    m, n = len(grid), len(grid[0])\n    MOD = 10**9 + 7\n    dp = [[[0] * k for _ in range(n)] for _ in range(m)]\n    dp[0][0] = [1 if grid[0][0] % k == i else 0 for i in range(k)]\n    for i in range(m):\n        for j in range(n):\n            if i == 0 and j == 0:\n                continue\n            for r in range(k):\n                if i > 0:\n                    prev_r = (r - grid[i][j] % k) % k\n                    dp[i][j][r] += dp[i-1][j][prev_r]\n                if j > 0:\n                    prev_r = (r - grid[i][j] % k) % k\n                    dp[i][j][r] += dp[i][j-1][prev_r]\n                dp[i][j][r] %= MOD\n    return dp[m-1][n-1][0]", "opt_code": "def numberOfPaths(grid, k):\n    m, n = len(grid), len(grid[0])\n    MOD = 10**9 + 7\n    prev = [[0] * k for _ in range(n)]\n    prev[0][grid[0][0] % k] = 1\n    for i in range(m):\n        curr = [[0] * k for _ in range(n)]\n        for j in range(n):\n            if i == 0 and j == 0:\n                curr[0][grid[0][0] % k] = 1\n                continue\n            for r in range(k):\n                new_r = (r - grid[i][j] % k) % k\n                if i > 0:\n                    curr[j][r] += prev[j][new_r]\n                if j > 0:\n                    curr[j][r] += curr[j-1][new_r]\n                curr[j][r] %= MOD\n        prev = curr\n    return prev[n-1][0]"},
            "2591": {"title": "Distribute Money to Maximum Children", "difficulty": "Easy", "patterns": ["Math", "Greedy"], "bf_time": "O(n)", "bf_space": "O(1)", "opt_time": "O(1)", "opt_space": "O(1)", "bf_points": ["Simulate distribution", "Greedy approach"], "opt_points": ["Mathematical formula", "Handle edge cases"], "bf_code": "def distMoney(money, children):\n    if money < children:\n        return -1\n    count = 0\n    remaining = money - children\n    for i in range(children - 1):\n        if remaining >= 7:\n            remaining -= 7\n            count += 1\n        else:\n            break\n    if remaining == 0:\n        return count\n    if remaining == 3 or (remaining > 0 and count == children - 1):\n        return count - 1\n    return count", "opt_code": "def distMoney(money, children):\n    if money < children:\n        return -1\n    remainder = money - children\n    max_eight = children - 1\n    count = min(remainder // 7, max_eight)\n    remainder -= count * 7\n    if remainder == 0:\n        return count\n    if remainder == 3 or (remainder > 0 and count == children - 1):\n        return count - 1\n    return count"}

                    <div style="display: flex; align-items: center; gap: 15px; flex: 1;">
                        <span class="toggle-icon">▼</span>
                        <span class="pattern-title">${pattern}</span>
                    </div>
                    <span class="pattern-count">${visibleProblems.length} problems</span>
                `;
                patternHeader.addEventListener("click", () => {
                    patternHeader.classList.toggle("collapsed");
                    problemsGrid.classList.toggle("collapsed");
                });

                const problemsGrid = document.createElement("div");
                problemsGrid.className = "problems-grid";

                visibleProblems.forEach(id => {
                    const p = problemsData[id.toString()];
                    const card = createProblemCard(id, p);
                    problemsGrid.appendChild(card);
                });

                patternSection.appendChild(patternHeader);
                patternSection.appendChild(problemsGrid);
                container.appendChild(patternSection);
            });

            document.getElementById("noResults").classList.toggle("hidden", hasVisibleProblems);
        }

        function createProblemCard(id, data) {
            const card = document.createElement("div");
            card.className = "problem-card";

            const header = document.createElement("div");
            header.className = "problem-header";
            header.innerHTML = `
                <div class="problem-title">
                    <span class="problem-number">#${id}</span>
                    <span class="problem-name">${data.title}</span>
                </div>
                <div class="problem-meta">
                    <span class="badge ${data.difficulty.toLowerCase()}">${data.difficulty}</span>
                    ${data.patterns.map(p => `<span class="badge pattern-badge">${p}</span>`).join('')}
                </div>
            `;

            const content = document.createElement("div");
            content.className = "problem-content collapsed";

            const solutionGrid = document.createElement("div");
            solutionGrid.className = "solution-grid";

            // Brute Force Solution
            const bfSection = document.createElement("div");
            bfSection.className = "solution";
            bfSection.innerHTML = `
                <div class="solution-title">Brute Force</div>
                <div class="key-points">
                    <h4>Key Points</h4>
                    <ol>
                        ${data.bf_points.map(point => `<li>${point}</li>`).join('')}
                    </ol>
                </div>
                <div class="complexity-badges">
                    <span class="complexity-badge">Time: ${data.bf_time}</span>
                    <span class="complexity-badge">Space: ${data.bf_space}</span>
                </div>
                <div class="code-block"><code>${escapeHtml(data.bf_code)}</code></div>
            `;

            // Optimized Solution
            const optSection = document.createElement("div");
            optSection.className = "solution";
            optSection.innerHTML = `
                <div class="solution-title">Optimized</div>
                <div class="key-points">
                    <h4>Key Points</h4>
                    <ol>
                        ${data.opt_points.map(point => `<li>${point}</li>`).join('')}
                    </ol>
                </div>
                <div class="complexity-badges">
                    <span class="complexity-badge">Time: ${data.opt_time}</span>
                    <span class="complexity-badge">Space: ${data.opt_space}</span>
                </div>
                <div class="code-block"><code>${escapeHtml(data.opt_code)}</code></div>
            `;

            solutionGrid.appendChild(bfSection);
            solutionGrid.appendChild(optSection);
            content.appendChild(solutionGrid);

            header.addEventListener("click", () => {
                header.classList.toggle("collapsed");
                content.classList.toggle("collapsed");
            });

            card.appendChild(header);
            card.appendChild(content);
            return card;
        }

        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event Listeners
        document.getElementById("searchInput").addEventListener("input", (e) => {
            currentSearchQuery = e.target.value;
            renderCheatSheet();
        });

        document.querySelectorAll(".difficulty-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelectorAll(".difficulty-btn").forEach(b => b.classList.remove("active"));
                e.target.classList.add("active");
                currentDifficultyFilter = e.target.dataset.difficulty;
                renderCheatSheet();
            });
        });

        document.getElementById("expandAllBtn").addEventListener("click", () => {
            document.querySelectorAll(".pattern-header").forEach(h => h.classList.remove("collapsed"));
            document.querySelectorAll(".problems-grid").forEach(g => g.classList.remove("collapsed"));
            document.querySelectorAll(".problem-header").forEach(h => h.classList.remove("collapsed"));
            document.querySelectorAll(".problem-content").forEach(c => c.classList.remove("collapsed"));
        });

        document.getElementById("collapseAllBtn").addEventListener("click", () => {
            document.querySelectorAll(".pattern-header").forEach(h => h.classList.add("collapsed"));
            document.querySelectorAll(".problems-grid").forEach(g => g.classList.add("collapsed"));
            document.querySelectorAll(".problem-header").forEach(h => h.classList.add("collapsed"));
            document.querySelectorAll(".problem-content").forEach(c => c.classList.add("collapsed"));
        });

        renderCheatSheet();
    </script>
</body>
</html>
